apiVersion: apps/v1
kind: Deployment
metadata:
  name: orca-web
  namespace: orca-web
  labels:
    app: orca-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orca-web
  template:
    metadata:
      labels:
        app: orca-web
    spec:
      containers:
        - name: web
          image: REPLACE_WITH_YOUR_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: orca-web-config
            - secretRef:
                name: orca-web-secrets
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
